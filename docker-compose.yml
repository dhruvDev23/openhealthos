version: '3.8'

services:

    web:
        build: .
        ports:
            - "8000:8000"
        volumes:
            - ./backend:/app/backend
        environment:
            - REDIS_URL=redis://redis:6379/0
        depends_on:
            - redis

    redis:
        image: "redis:alpine"
        ports:
            - "6379:6379"